<!DOCTYPE html>
<html>
<head>
    <title>Debug Console</title>
    <style>
        body { font-family: monospace; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <p style="margin: 0 0 12px; padding: 8px; background: #fff3cd; border: 1px solid #ffeeba;">
        Nota: arquivo de depuracao para uso local. Nao publicar em producao.
    </p>
    <h1>Debug Console</h1>
    <div id="logs"></div>
    <script>
        const logs = document.getElementById('logs');
        
        // Interceptar console.error
        const originalError = console.error;
        console.error = function(...args) {
            logs.innerHTML += `<div class="error">ERROR: ${args.join(' ')}</div>`;
            originalError.apply(console, args);
        };
        
        // Interceptar console.log
        const originalLog = console.log;
        console.log = function(...args) {
            logs.innerHTML += `<div>LOG: ${args.join(' ')}</div>`;
            originalLog.apply(console, args);
        };
        
        // Capturar erros não capturados
        window.addEventListener('error', function(e) {
            logs.innerHTML += `<div class="error">UNCAUGHT ERROR: ${e.message} at ${e.filename}:${e.lineno}</div>`;
        });
        
        // Testar carregamento
        logs.innerHTML += '<div class="success">✓ Debug console inicializado</div>';
        
        // Tentar carregar iframe com a app
        const iframe = document.createElement('iframe');
        iframe.src = 'https://veiculosnapraianao.web.app';
        iframe.style.width = '100%';
        iframe.style.height = '500px';
        document.body.appendChild(iframe);
    </script>
</body>
</html>
